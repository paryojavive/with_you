services:
  docs:
    image: with_you_local_docs
    container_name: with_you_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - /app/.venv
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./with_you:/app/with_you:z
    ports:
      - '9000:9000'
    command: /start-docs
